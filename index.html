<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beton Archive - Flappy Kedi</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #0d0f18 0%, #171c2d 100%);
            font-family: 'Fredoka', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
            touch-action: manipulation;
        }
        .game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: #0f172a;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            border: 2px solid rgba(139, 92, 246, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #0f172a;
            z-index: 10;
            padding: 20px;
        }
        .screen.active {
            display: flex;
        }

        /* Intro Ekranı */
        .intro-title {
            font-size: 28px;
            background: linear-gradient(135deg, #3b82f6, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeInOut 2s ease forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; }
        }

        /* Menü Stilleri */
        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #3b82f6, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 25px;
        }
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 80%;
        }
        .game-btn {
            background: linear-gradient(135deg, #3b82f6, #9333ea);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-family: 'Fredoka', sans-serif;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(147, 51, 234, 0.4);
            transition: transform 0.2s;
        }
        .game-btn:hover { transform: translateY(-2px); }
        .game-btn.secondary {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        /* Oyun Tuvali */
        canvas {
            display: block;
            background: linear-gradient(to bottom, #120f2e, #281036);
            cursor: pointer;
        }

        .info-box {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 12px;
            padding: 15px;
            width: 85%;
            font-size: 14px;
            line-height: 1.5;
            color: #e2e8f0;
            margin-bottom: 20px;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="game-container">

    <!-- 1. Intro Ekranı -->
    <div id="introScreen" class="screen active">
        <h1 class="intro-title">Beton Archive Sunar</h1>
    </div>

    <!-- 2. Ana Menü Ekranı -->
    <div id="menuScreen" class="screen">
        <h1>Flappy Kedi</h1>
        <p class="subtitle">Beton Archive Stüdyosu</p>
        <div class="menu-buttons">
            <button class="game-btn" onclick="startGame()">🎮 Oyna</button>
            <button class="game-btn secondary" onclick="showScreen('howToPlayScreen')">❓ Nasıl Oynanır</button>
            <button class="game-btn secondary" onclick="showScreen('leaderboardScreen')">🏆 En Yüksek Skor</button>
        </div>
    </div>

    <!-- 3. Oyun Ekranı -->
    <div id="gameScreen" class="screen" style="padding:0;">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <!-- 4. Nasıl Oynanır Ekranı -->
    <div id="howToPlayScreen" class="screen">
        <h2>Nasıl Oynanır?</h2>
        <div class="info-box">
            <p>1. Ekrana veya boşluk tuşuna dokunarak kanatlı kedini uçur.</p>
            <p>2. Borulara çarpmadan aralarından geçerek puan topla.</p>
            <p>3. Yere düşersen veya boruya çarparsan oyun biter!</p>
        </div>
        <button class="game-btn secondary" onclick="showScreen('menuScreen')">⬅ Ana Menü</button>
    </div>

    <!-- 5. En Yüksek Skor Ekranı -->
    <div id="leaderboardScreen" class="screen">
        <h2>En Yüksek Skor</h2>
        <div class="info-box" style="text-align: center;">
            <p style="font-size: 20px; color: #38bdf8; font-weight: bold;" id="bestScoreDisplay">0</p>
        </div>
        <button class="game-btn secondary" onclick="showScreen('menuScreen')">⬅ Ana Menü</button>
    </div>

</div>

<!-- Arka Plan Şarkısı -->
<audio id="bgMusic" src="gittim.m4a" loop></audio>

<script>
    const bgMusic = document.getElementById("bgMusic");
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let gameState = 'MENU';
    let score = 0;
    let highScore = localStorage.getItem('flappyHighScore') || 0;

    let cat = {
        x: 100,
        y: 280,
        width: 50,
        height: 36,
        gravity: 0.35,
        lift: -6.5,
        velocity: 0
    };

    let pipes = [];
    let pipeWidth = 65;
    let pipeGap = 160;
    let pipeSpeed = 2.5;
    let frameCount = 0;

    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            showScreen('menuScreen');
        }, 2200);
    });

    window.showScreen = function(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(screenId);
        if (target) target.classList.add('active');

        if (screenId === 'leaderboardScreen') {
            document.getElementById("bestScoreDisplay").innerText = "Rekor: " + highScore;
        }
    }

    function startGame() {
        showScreen('gameScreen');
        gameState = 'PLAYING';
        score = 0;
        cat.x = 100;
        cat.y = 280;
        cat.velocity = 0;
        pipes = [];
        frameCount = 0;

        bgMusic.play().catch(e => console.log("Müzik çalma hatası:", e));
        
        loop();
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && gameState === 'PLAYING') {
            cat.velocity = cat.lift;
        }
    });

    canvas.addEventListener('click', () => {
        if (gameState === 'PLAYING') {
            cat.velocity = cat.lift;
        } else if (gameState === 'GAMEOVER') {
            startGame();
        }
    });

    function loop() {
        if (gameState !== 'PLAYING') return;

        cat.velocity += cat.gravity;
        cat.y += cat.velocity;

        if (cat.y + cat.height >= canvas.height || cat.y <= 0) {
            endGame();
            return;
        }

        frameCount++;
        if (frameCount % 100 === 0) {
            let minHeight = 60;
            let maxHeight = canvas.height - pipeGap - 60;
            let randomHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;

            pipes.push({
                x: canvas.width,
                top: randomHeight,
                bottom: canvas.height - randomHeight - pipeGap,
                passed: false
            });
        }

        for (let i = pipes.length - 1; i >= 0; i--) {
            pipes[i].x -= pipeSpeed;

            if (!pipes[i].passed && pipes[i].x + pipeWidth < cat.x) {
                score++;
                pipes[i].passed = true;
            }

            if (
                cat.x + 5 < pipes[i].x + pipeWidth &&
                cat.x + cat.width - 5 > pipes[i].x &&
                (cat.y + 5 < pipes[i].top || cat.y + cat.height - 5 > canvas.height - pipes[i].bottom)
            ) {
                endGame();
                return;
            }

            if (pipes[i].x + pipeWidth < 0) {
                pipes.splice(i, 1);
            }
        }

        draw();
        requestAnimationFrame(loop);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Borular
        ctx.fillStyle = '#9333ea';
        for (let pipe of pipes) {
            ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
            ctx.fillRect(pipe.x, canvas.height - pipe.bottom, pipeWidth, pipe.bottom);
        }

        // Kanatlı Kedi Çizimi
        ctx.save();
        ctx.translate(cat.x + cat.width / 2, cat.y + cat.height / 2);
        
        let rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, cat.velocity * 0.08));
        ctx.rotate(rotation);

        ctx.strokeStyle = '#f97316';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(-22, 5);
        ctx.quadraticCurveTo(-35, -5, -30, -15);
        ctx.stroke();

        ctx.fillStyle = '#ea580c';
        ctx.beginPath();
        ctx.ellipse(0, 4, 22, 15, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#fed7aa';
        ctx.beginPath();
        ctx.ellipse(6, 6, 12, 10, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#f97316';
        ctx.beginPath();
        ctx.arc(12, -4, 14, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(3, -13);
        ctx.lineTo(8, -24);
        ctx.lineTo(15, -14);
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(14, -13);
        ctx.lineTo(21, -22);
        ctx.lineTo(23, -12);
        ctx.fill();

        ctx.fillStyle = '#fbcfe8';
        ctx.beginPath();
        ctx.moveTo(6, -14);
        ctx.lineTo(9, -20);
        ctx.lineTo(12, -14);
        ctx.fill();

        ctx.fillStyle = '#0f172a';
        ctx.beginPath();
        ctx.arc(16, -6, 2, 0, Math.PI * 2);
        ctx.arc(11, -6, 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#fda4af';
        ctx.beginPath();
        ctx.arc(14, -2, 1.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(16, -1); ctx.lineTo(24, -2);
        ctx.moveTo(16, 1); ctx.lineTo(23, 3);
        ctx.stroke();

        let wingFlap = Math.sin(Date.now() / 60) * 0.7;
        ctx.save();
        ctx.translate(-4, -6);
        ctx.rotate(wingFlap);
        ctx.fillStyle = '#38bdf8';
        ctx.beginPath();
        ctx.ellipse(0, -6, 14, 6, -0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.restore();

        // Skor
        ctx.fillStyle = 'white';
        ctx.font = 'bold 26px Fredoka';
        ctx.textAlign = 'center';
        ctx.fillText(score, canvas.width / 2, 50);
    }

    function endGame() {
        gameState = 'GAMEOVER';
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('flappyHighScore', highScore);
        }

        ctx.fillStyle = 'rgba(15, 23, 42, 0.88)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = 'white';
        ctx.font = 'bold 28px Fredoka';
        ctx.textAlign = 'center';
        ctx.fillText("Oyun Bitti!", canvas.width / 2, canvas.height / 2 - 40);

        ctx.font = '18px Fredoka';
        ctx.fillStyle = '#c084fc';
        ctx.fillText("Skorun: " + score, canvas.width / 2, canvas.height / 2);
        ctx.fillText("Yeniden başlamak için dokun", canvas.width / 2, canvas.height / 2 + 40);
    }
</script>

</body>
    </html>
